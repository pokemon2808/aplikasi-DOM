<!DOCTYPE html>
<html lang="id">
<head>
    <!-- CSS tetap sama dengan sebelumnya, tambahkan sedikit untuk form -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ TOPIK DOM</title>
    <!-- Ikon untuk Tab Browser -->
    <link rel="icon" href="favicon.png" type="image/png">

    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* ... (Gunakan CSS dari versi sebelumnya) ... */
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --error: #ff7675;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6c5ce7, #00d2ff);
        }

        .quiz-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .high-score-tag {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .timer-wrapper {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            transition: width 1s linear;
        }

        #question {
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 25px;
            font-weight: 700;
            min-height: 60px;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #f1f2f6;
            border-radius: 12px;
            background: white;
            color: var(--dark);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f8f9ff;
            transform: translateX(8px);
        }

        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        /* Styling Form Input */
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.9rem; font-weight: 600; color: var(--dark); }
        input {
            width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee;
            border-radius: 10px; box-sizing: border-box; font-family: inherit;
        }
        .btn-start {
            background: var(--primary); color: white; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-card">
    <!-- 1. Layar Registrasi -->
    <div id="registration-area">
        <h2>Pendaftaran Kuis</h2>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="inputName" placeholder="Masukkan nama...">
        </div>
        <div class="form-group">
            <label>NIM</label>
            <input type="text" id="inputNim" placeholder="Masukkan NIM...">
        </div>
        <button class="btn-start" id="startQuizBtn">Mulai Kuis</button>
    </div>

    <!-- 2. Layar Kuis (Hidden by default) -->
    <div id="quiz-content" class="hidden">
        <div class="high-score-tag">🏆 REKOR: <span id="highScoreDisplay">0</span></div>
        <div class="timer-wrapper"><div id="timer-bar"></div></div>
        <div id="question">Memuat soal...</div>
        <div class="options-container" id="options"></div>
    </div>

    <!-- 3. Layar Hasil -->
    <div id="score-area" class="hidden">
        <h2 id="finish-msg">Hasil Kuis</h2>
        <p id="user-info" style="font-weight: 600; color: var(--primary);"></p>
        <p id="final-score" style="font-size: 1.2rem;"></p>
        <button class="btn-start" onclick="location.reload()">Selesai</button>
    </div>
</div>

<script type="module">
    import { quizData } from './question.js';

    let currentIdx = 0, score = 0, timeLeft = 10, timerInterval;
    let userData = { name: "", nim: "" };

    const regArea = document.getElementById('registration-area');
    const quizContent = document.getElementById('quiz-content');
    const scoreArea = document.getElementById('score-area');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const timerBar = document.getElementById('timer-bar');

    // Tombol Mulai
    document.getElementById('startQuizBtn').addEventListener('click', () => {
        const name = document.getElementById('inputName').value;
        const nim = document.getElementById('inputNim').value;

        if (name === "" || nim === "") {
            alert("Harap isi Nama dan NIM terlebih dahulu!");
            return;
        }

        userData.name = name;
        userData.nim = nim;

        // Pindah layar
        regArea.classList.add('hidden');
        quizContent.classList.remove('hidden');
        
        loadQuiz();
    });

    function startTimer() {
        timeLeft = 10;
        timerBar.style.width = "100%";
        timerBar.style.background = "linear-gradient(to right, var(--primary), var(--secondary))";
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timerBar.style.width = (timeLeft / 10) * 100 + "%";
            if (timeLeft <= 3) timerBar.style.background = "var(--error)";
            if (timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(-1, null); }
        }, 1000);
    }

    function loadQuiz() {
        optionsEl.innerHTML = "";
        const data = quizData[currentIdx];
        questionEl.innerText = data.question;
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'option-btn';
            btn.onclick = () => checkAnswer(i, btn);
            optionsEl.appendChild(btn);
        });
        startTimer();
    }

    function checkAnswer(idx, btn) {
        clearInterval(timerInterval);
        const correct = quizData[currentIdx].answer;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        if (idx === correct) {
            score++;
            btn.classList.add('correct');
        } else if (btn) {
            btn.classList.add('wrong');
            all[correct].classList.add('correct');
        } else {
            all[correct].classList.add('correct'); // Jika waktu habis
        }

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) loadQuiz();
            else showResult();
        }, 1200);
    }

    function showResult() {
        quizContent.classList.add('hidden');
        scoreArea.classList.remove('hidden');
        
        // Tampilkan Nama dan NIM di hasil akhir
        document.getElementById('user-info').innerText = `${userData.name} (${userData.nim})`;
        document.getElementById('final-score').innerText = `Skor Akhir: ${score} / ${quizData.length}`;
        
        // Simpan High Score (Opsional)
        let hs = localStorage.getItem('quizHS_Modern') || 0;
        if (score > hs) localStorage.setItem('quizHS_Modern', score);
    }
</script>
</body>
</html>
